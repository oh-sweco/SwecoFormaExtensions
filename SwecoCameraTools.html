<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axonometric View</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 0;
        padding: 12px;
        font-size: 14px;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      input,
      button {
        font: inherit;
      }

      input[type="range"] {
        width: 100%;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      button {
        padding: 8px 10px;
        cursor: pointer;
      }

      .value {
        min-width: 3ch;
        text-align: right;
      }

      .hint {
        opacity: 0.8;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <label>
        Angle from ground
        <div class="row">
          <input id="angle" type="range" min="0" max="90" value="30" />
          <div class="value"><span id="angleValue">30</span>°</div>
        </div>
      </label>

      <button id="apply">Set Axonometric View</button>

      <div class="hint">
        Centers on the current camera target and keeps the current viewing direction.
      </div>
    </div>

    <script type="module">
      import { Forma } from "https://esm.sh/forma-embedded-view-sdk/auto";
      window.Forma = Forma;

      const angleInput = document.getElementById("angle");
      const angleValue = document.getElementById("angleValue");
      const applyButton = document.getElementById("apply");

      function toRadians(deg) {
        return (deg * Math.PI) / 180;
      }

      function normalize(v) {
        const len = Math.hypot(v.x, v.y, v.z) || 1;
        return { x: v.x / len, y: v.y / len, z: v.z / len };
      }

      function scale(v, s) {
        return { x: v.x * s, y: v.y * s, z: v.z * s };
      }

      function add(a, b) {
        return { x: a.x + b.x, y: a.y + b.y, z: a.z + b.z };
      }

      function sub(a, b) {
        return { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
      }

      function cross(a, b) {
        return {
          x: a.y * b.z - a.z * b.y,
          y: a.z * b.x - a.x * b.z,
          z: a.x * b.y - a.y * b.x
        };
      }

      angleInput.addEventListener("input", () => {
        angleValue.textContent = angleInput.value;
      });

      applyButton.addEventListener("click", async () => {
        try {
          const angleDeg = Number(angleInput.value);
          const angleRad = toRadians(angleDeg);

          const cam = await Forma.camera.getCurrent();
          const target = cam.target;
          const currentPosition = cam.position;

          const viewDir = normalize(sub(target, currentPosition));

          // Choose a world up vector.
          const worldUp = { x: 0, y: 0, z: 1 };

          // Build a sideways axis from the current viewing direction.
          let right = cross(viewDir, worldUp);
          const rightLen = Math.hypot(right.x, right.y, right.z);

          // Fallback if the current view is close to vertical.
          if (rightLen < 1e-6) {
            right = { x: 1, y: 0, z: 0 };
          } else {
            right = normalize(right);
          }

          // Keep the current azimuth/orientation, but adjust the elevation angle.
          const horizontal = Math.cos(angleRad);
          const vertical = Math.sin(angleRad);

          // Use the current distance from camera to target so framing stays familiar.
          const distance = Math.hypot(
            currentPosition.x - target.x,
            currentPosition.y - target.y,
            currentPosition.z - target.z
          ) || 1;

          const heightOffset = scale(worldUp, distance * vertical);
          const horizontalOffset = scale(right, distance * horizontal);

          // Camera remains on the same side of the target as the current orientation.
          const position = add(target, add(horizontalOffset, heightOffset));

          if (cam.type !== "orthographic") {
            await Forma.camera.switchPerspective();
          }

          await Forma.camera.move({
            position,
            target,
            transitionTimeMs: 0
          });
        } catch (err) {
          console.error("Failed to set axonometric view:", err);
          alert("Could not set axonometric view. See console for details.");
        }
      });
    </script>
  </body>
</html>
