<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axonometric View</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 0;
        padding: 12px;
        font-size: 14px;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      input[type="range"] {
        width: 100%;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .value {
        min-width: 3ch;
        text-align: right;
      }

      .hint {
        opacity: 0.8;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <label>
        Angle from ground
        <div class="row">
          <input id="angle" type="range" min="0" max="90" value="30" />
          <div class="value"><span id="angleValue">30</span>°</div>
        </div>
      </label>

      <div class="hint">
        Updates live. Keeps the current camera orientation and centers on the current target.
      </div>
    </div>

    <script type="module">
      import { Forma } from "https://esm.sh/forma-embedded-view-sdk/auto";
      window.Forma = Forma;

      const angleInput = document.getElementById("angle");
      const angleValue = document.getElementById("angleValue");

      let updateToken = 0;
      let isUpdating = false;

      function toRadians(deg) {
        return (deg * Math.PI) / 180;
      }

      function normalize(v) {
        const len = Math.hypot(v.x, v.y, v.z) || 1;
        return { x: v.x / len, y: v.y / len, z: v.z / len };
      }

      function scale(v, s) {
        return { x: v.x * s, y: v.y * s, z: v.z * s };
      }

      function add(a, b) {
        return { x: a.x + b.x, y: a.y + b.y, z: a.z + b.z };
      }

      function sub(a, b) {
        return { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
      }

      function cross(a, b) {
        return {
          x: a.y * b.z - a.z * b.y,
          y: a.z * b.x - a.x * b.z,
          z: a.x * b.y - a.y * b.x
        };
      }

      async function applyAngle(angleDeg) {
        const token = ++updateToken;
        if (isUpdating) return;
        isUpdating = true;

        try {
          const angleRad = toRadians(angleDeg);
          const cam = await Forma.camera.getCurrent();

          // Center on current camera target.
          const target = cam.target;
          const currentPosition = cam.position;

          // Current view direction.
          const viewDir = normalize(sub(target, currentPosition));

          // Use world-up for elevation, but preserve current azimuth by using the current
          // horizontal projection of the view direction.
          const worldUp = { x: 0, y: 0, z: 1 };

          const currentHorizontal = {
            x: viewDir.x,
            y: viewDir.y,
            z: 0
          };

          let horizontalDir = normalize(currentHorizontal);

          // If the current view is close to vertical, fall back to a stable direction
          // derived from the camera's right vector.
          if (Math.hypot(horizontalDir.x, horizontalDir.y, horizontalDir.z) < 1e-6) {
            let right = cross(viewDir, worldUp);
            if (Math.hypot(right.x, right.y, right.z) < 1e-6) {
              right = { x: 1, y: 0, z: 0 };
            }
            horizontalDir = normalize(right);
          }

          const distance =
            Math.hypot(
              currentPosition.x - target.x,
              currentPosition.y - target.y,
              currentPosition.z - target.z
            ) || 1;

          const horizontalMag = distance * Math.cos(angleRad);
          const verticalMag = distance * Math.sin(angleRad);

          const horizontalOffset = scale(horizontalDir, horizontalMag);
          const verticalOffset = scale(worldUp, verticalMag);

          const position = add(target, add(horizontalOffset, verticalOffset));

          if (cam.type !== "orthographic") {
            await Forma.camera.switchPerspective();
          }

          if (token !== updateToken) return;

          await Forma.camera.move({
            position,
            target,
            transitionTimeMs: 0
          });
        } catch (err) {
          console.error("Failed to update axonometric view:", err);
        } finally {
          isUpdating = false;
        }
      }

      angleInput.addEventListener("input", () => {
        const value = Number(angleInput.value);
        angleValue.textContent = value;
        applyAngle(value);
      });

      // Initialize immediately.
      applyAngle(Number(angleInput.value));
    </script>
  </body>
</html>
