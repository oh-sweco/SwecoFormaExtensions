<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axonometric View + Coloring</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 0;
        padding: 12px;
        font-size: 14px;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        border-radius: 8px;
      }

      .section h2 {
        margin: 0 0 4px 0;
        font-size: 14px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      input[type="range"] {
        width: 100%;
      }

      input[type="checkbox"] {
        transform: translateY(1px);
      }

      .value {
        min-width: 3ch;
        text-align: right;
      }

      .hint {
        opacity: 0.8;
        font-size: 12px;
      }

      .preview {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.5);
        flex: none;
      }

      .color-controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-left: 22px;
      }

      .color-picker-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .color-picker-wrap input[type="color"] {
        width: 46px;
        height: 32px;
        padding: 0;
        border: none;
        background: transparent;
      }

      .disabled {
        opacity: 0.45;
        pointer-events: none;
      }

      .button-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      .status {
        min-height: 20px;
        font-size: 13px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="section">
        <h2>Axonometric View</h2>
        <label class="row" style="flex-direction: row;">
          <input id="axonometryEnabled" type="checkbox" />
          <span>Enable axonometry auto-update</span>
        </label>

        <label>
          Angle from ground
          <div class="row">
            <input id="angle" type="range" min="0" max="90" value="30" />
            <div class="value"><span id="angleValue">30</span>°</div>
          </div>
        </label>

        <div class="hint">Auto-updates only when enabled.</div>
      </div>

      <div class="section">
        <h2>Geometry Coloring</h2>

        <label class="row" style="flex-direction: row;">
          <input id="geometryEnabled" type="checkbox" />
          <span>Enable geometry coloring</span>
        </label>

        <div id="geometryControls" class="color-controls disabled">
          <div class="color-picker-wrap">
            <input id="insideColor" type="color" value="#4f8cff" />
            <div id="insidePreview" class="preview" style="background:#4f8cff"></div>
            <span>Inside site limit</span>
          </div>

          <div class="color-picker-wrap">
            <input id="outsideColor" type="color" value="#d95f5f" />
            <div id="outsidePreview" class="preview" style="background:#d95f5f"></div>
            <span>Outside site limit</span>
          </div>

          <div class="color-picker-wrap">
            <input id="selectionColor" type="color" value="#00ff00" />
            <div id="selectionPreview" class="preview" style="background:#00ff00"></div>
            <span>Selection override</span>
          </div>

          <div class="button-row">
            <button id="applyGeometryBtn">Apply geometry colors</button>
            <button id="clearGeometryBtn">Clear geometry colors</button>
          </div>

          <div class="hint">
            Colors are applied as: inside site limit, outside site limit, then selection override.
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Terrain Coloring</h2>

        <label class="row" style="flex-direction: row;">
          <input id="terrainEnabled" type="checkbox" />
          <span>Enable terrain coloring</span>
        </label>

        <div id="terrainControls" class="color-controls disabled">
          <div class="color-picker-wrap">
            <input id="terrainColor" type="color" value="#4fe08c" />
            <div id="terrainPreview" class="preview" style="background:#4fe08c"></div>
            <span>Terrain color</span>
          </div>

          <div class="button-row">
            <button id="applyTerrainBtn">Apply terrain color</button>
            <button id="clearTerrainBtn">Clear terrain color</button>
          </div>

          <div class="hint">
            Uses terrain.getBbox() + a full-cover ground texture.
          </div>
        </div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <script type="module">
      import { Forma } from "https://esm.sh/forma-embedded-view-sdk/auto";
      window.Forma = Forma;

      const statusEl = document.getElementById("status");

      const angleInput = document.getElementById("angle");
      const angleValue = document.getElementById("angleValue");
      const axonometryEnabled = document.getElementById("axonometryEnabled");

      const geometryEnabled = document.getElementById("geometryEnabled");
      const geometryControls = document.getElementById("geometryControls");
      const insideColor = document.getElementById("insideColor");
      const outsideColor = document.getElementById("outsideColor");
      const selectionColor = document.getElementById("selectionColor");
      const insidePreview = document.getElementById("insidePreview");
      const outsidePreview = document.getElementById("outsidePreview");
      const selectionPreview = document.getElementById("selectionPreview");
      const applyGeometryBtn = document.getElementById("applyGeometryBtn");
      const clearGeometryBtn = document.getElementById("clearGeometryBtn");

      const terrainEnabled = document.getElementById("terrainEnabled");
      const terrainControls = document.getElementById("terrainControls");
      const terrainColor = document.getElementById("terrainColor");
      const terrainPreview = document.getElementById("terrainPreview");
      const applyTerrainBtn = document.getElementById("applyTerrainBtn");
      const clearTerrainBtn = document.getElementById("clearTerrainBtn");

      let updateTimer = null;
      let updateId = 0;
      let terrainTextureHandle = null;
      let selectionPaths = [];

      const DRAG_DELAY_MS = 80;

      function setStatus(msg) {
        statusEl.textContent = msg || "";
      }

      function toggleControls(enabled, controlsEl) {
        controlsEl.classList.toggle("disabled", !enabled);
      }

      function isValidHexColor(value) {
        return /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(value);
      }

      function setPreview(el, color) {
        el.style.background = color;
      }

      function toRadians(deg) {
        return (deg * Math.PI) / 180;
      }

      function normalize2D(x, y) {
        const len = Math.hypot(x, y) || 1;
        return { x: x / len, y: y / len };
      }

      async function applyAngle(angleDeg) {
        if (!axonometryEnabled.checked) return;

        const myUpdate = ++updateId;

        try {
          const current = await Forma.camera.getCurrent();
          const target = current?.target || { x: 0, y: 0, z: 0 };
          const position = current?.position || { x: 0, y: 0, z: 100 };

          const dx = position.x - target.x;
          const dy = position.y - target.y;
          const dz = position.z - target.z;

          const distance = Math.hypot(dx, dy, dz) || 100;
          const azimuth = Math.atan2(dy, dx);

          const elevation = toRadians(angleDeg);
          const horizontalRadius = Math.cos(elevation) * distance;
          const verticalOffset = Math.sin(elevation) * distance;

          const dir2D = normalize2D(Math.cos(azimuth), Math.sin(azimuth));

          const newPosition = {
            x: target.x + dir2D.x * horizontalRadius,
            y: target.y + dir2D.y * horizontalRadius,
            z: target.z + verticalOffset
          };

          if (current?.type !== "orthographic") {
            await Forma.camera.switchPerspective();
          }

          if (myUpdate !== updateId) return;

          await Forma.camera.move({
            position: newPosition,
            target,
            transitionTimeMs: 0
          });
        } catch (err) {
          console.error("Failed to update camera:", err);
          setStatus(`Camera error: ${err.message}`);
        }
      }

      function scheduleLiveUpdate(angleDeg) {
        angleValue.textContent = angleDeg;
        if (!axonometryEnabled.checked) return;

        if (updateTimer) clearTimeout(updateTimer);
        updateTimer = setTimeout(() => applyAngle(angleDeg), DRAG_DELAY_MS);
      }

      async function commitAxonometry(angleDeg) {
        if (updateTimer) {
          clearTimeout(updateTimer);
          updateTimer = null;
        }
        await applyAngle(angleDeg);
      }

      async function getPathsByAnyCategory(categories) {
        for (const category of categories) {
          try {
            const paths = await Forma.geometry.getPathsByCategory({ category });
            if (paths && paths.length > 0) return { category, paths };
          } catch {}
        }
        return { category: null, paths: [] };
      }

      async function getSiteLimitPolygons() {
        const siteLimitSearch = await getPathsByAnyCategory([
          "site_limit",
          "site-limit",
          "sitelimit",
          "site limit"
        ]);

        if (!siteLimitSearch.paths.length) return [];

        const polygons = [];
        for (const path of siteLimitSearch.paths) {
          try {
            const footprint = await Forma.geometry.getFootprint({ path });
            if (!footprint) continue;

            if (Array.isArray(footprint.polygons)) {
              for (const poly of footprint.polygons) {
                if (Array.isArray(poly) && poly.length > 0) polygons.push(poly);
              }
            } else if (Array.isArray(footprint.polygon)) {
              polygons.push(footprint.polygon);
            } else if (Array.isArray(footprint.coordinates)) {
              polygons.push(footprint.coordinates);
            }
          } catch (e) {
            console.warn("Failed to read site limit footprint:", path, e);
          }
        }

        return polygons;
      }

      async function getColorablePathsInsideAndOutsideSiteLimit() {
        const [siteLimitPolygons, allPathsResult] = await Promise.all([
          getSiteLimitPolygons(),
          (async () => {
            const building = await getPathsByAnyCategory(["building", "buildings"]);
            const roads = await getPathsByAnyCategory(["road", "roads"]);
            const trees = await getPathsByAnyCategory(["tree", "trees"]);
            const terrain = await getPathsByAnyCategory(["terrain"]);
            return [...building.paths, ...roads.paths, ...trees.paths, ...terrain.paths];
          })()
        ]);

        if (!siteLimitPolygons.length) return { inside: [], outside: allPathsResult };

        const inside = await Forma.geometry.getPathsInsidePolygons({
          polygons: siteLimitPolygons
        });

        const insideSet = new Set(inside);
        const outside = allPathsResult.filter((p) => !insideSet.has(p));

        return { inside, outside };
      }

      async function applyGeometryColors() {
        if (!geometryEnabled.checked) return;

        try {
          if (!isValidHexColor(insideColor.value) ||
              !isValidHexColor(outsideColor.value) ||
              !isValidHexColor(selectionColor.value)) {
            setStatus("Invalid geometry color value.");
            return;
          }

          const { inside, outside } = await getColorablePathsInsideAndOutsideSiteLimit();

          await Forma.render.elementColors.clearAll();

          const pathsToColor = new Map();

          for (const path of outside) {
            pathsToColor.set(path, outsideColor.value);
          }

          for (const path of inside) {
            pathsToColor.set(path, insideColor.value);
          }

          for (const path of selectionPaths) {
            pathsToColor.set(path, selectionColor.value);
          }

          await Forma.render.elementColors.set({ pathsToColor });
          setStatus(
            `Applied geometry colors. Inside: ${inside.length}, outside: ${outside.length}, selection: ${selectionPaths.length}.`
          );
        } catch (err) {
          console.error("Failed to apply geometry colors:", err);
          setStatus(`Geometry color error: ${err.message}`);
        }
      }

      async function clearGeometryColors() {
        try {
          await Forma.render.elementColors.clearAll();
          setStatus("Cleared geometry colors.");
        } catch (err) {
          console.error("Failed to clear geometry colors:", err);
          setStatus(`Geometry clear error: ${err.message}`);
        }
      }

      async function createSolidTerrainTexture(color) {
        const bbox = await Forma.terrain.getBbox();

        const minX = bbox?.min?.x ?? -50;
        const maxX = bbox?.max?.x ?? 50;
        const minY = bbox?.min?.y ?? -50;
        const maxY = bbox?.max?.y ?? 50;
        const maxZ = bbox?.max?.z ?? 0;

        const width = Math.max(1, maxX - minX);
        const height = Math.max(1, maxY - minY);
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;

        const canvas = document.createElement("canvas");
        canvas.width = 1024;
        canvas.height = 1024;

        const ctx = canvas.getContext("2d");
        if (!ctx) throw new Error("Could not get canvas 2D context.");

        ctx.fillStyle = color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const handle = await Forma.terrain.groundTexture.add({
          name: "terrainColor",
          canvas,
          position: { x: centerX, y: centerY, z: maxZ + 1 },
          scale: { x: width / 100, y: height / 100 }
        });

        return handle;
      }

      async function applyTerrainColor() {
        if (!terrainEnabled.checked) return;

        try {
          if (terrainTextureHandle?.remove) {
            await terrainTextureHandle.remove();
            terrainTextureHandle = null;
          }

          terrainTextureHandle = await createSolidTerrainTexture(terrainColor.value);
          setStatus("Applied terrain color.");
        } catch (err) {
          console.error("Failed to apply terrain color:", err);
          setStatus(`Terrain color error: ${err.message}`);
        }
      }

      async function clearTerrainColor() {
        try {
          if (terrainTextureHandle?.remove) {
            await terrainTextureHandle.remove();
          }
          terrainTextureHandle = null;
          setStatus("Cleared terrain color.");
        } catch (err) {
          console.error("Failed to clear terrain color:", err);
          setStatus(`Terrain clear error: ${err.message}`);
        }
      }

      geometryEnabled.addEventListener("change", async () => {
        toggleControls(geometryEnabled.checked, geometryControls);
        if (geometryEnabled.checked) await applyGeometryColors();
        else await clearGeometryColors();
      });

      applyGeometryBtn.addEventListener("click", applyGeometryColors);
      clearGeometryBtn.addEventListener("click", clearGeometryColors);

      insideColor.addEventListener("input", () => {
        setPreview(insidePreview, insideColor.value);
        if (geometryEnabled.checked) applyGeometryColors();
      });

      outsideColor.addEventListener("input", () => {
        setPreview(outsidePreview, outsideColor.value);
        if (geometryEnabled.checked) applyGeometryColors();
      });

      selectionColor.addEventListener("input", () => {
        setPreview(selectionPreview, selectionColor.value);
        if (geometryEnabled.checked) applyGeometryColors();
      });

      Forma.selection.subscribe(({ paths }) => {
        selectionPaths = paths ?? [];
        if (geometryEnabled.checked) applyGeometryColors();
      });

      terrainEnabled.addEventListener("change", async () => {
        toggleControls(terrainEnabled.checked, terrainControls);
        if (terrainEnabled.checked) await applyTerrainColor();
        else await clearTerrainColor();
      });

      applyTerrainBtn.addEventListener("click", applyTerrainColor);
      clearTerrainBtn.addEventListener("click", clearTerrainColor);

      terrainColor.addEventListener("input", () => {
        setPreview(terrainPreview, terrainColor.value);
        if (terrainEnabled.checked) applyTerrainColor();
      });

      angleInput.addEventListener("input", () => scheduleLiveUpdate(Number(angleInput.value)));
      angleInput.addEventListener("change", () => commitAxonometry(Number(angleInput.value)));
      angleInput.addEventListener("pointerup", () => commitAxonometry(Number(angleInput.value)));

      setPreview(insidePreview, insideColor.value);
      setPreview(outsidePreview, outsideColor.value);
      setPreview(selectionPreview, selectionColor.value);
      setPreview(terrainPreview, terrainColor.value);
      toggleControls(false, geometryControls);
      toggleControls(false, terrainControls);
      angleValue.textContent = angleInput.value;
    </script>
  </body>
</html>
